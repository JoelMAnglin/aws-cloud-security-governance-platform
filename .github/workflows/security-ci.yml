name: Security CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.10.5

      - name: Terraform format
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform initialize
        run: terraform -chdir=terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test and security tools
        run: python -m pip install --upgrade pip && pip install -e ".[dev]"

      - name: Python lint and format
        run: |
          ruff check .
          ruff format --check .

      - name: Lambda unit tests
        run: pytest

      - name: Static security analysis
        run: bandit -q -r lambda

      - name: Dependency vulnerability audit
        run: pip-audit

      - name: Trivy IaC, secret, and vulnerability scan
        uses: aquasecurity/trivy-action@0.33.1
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true

